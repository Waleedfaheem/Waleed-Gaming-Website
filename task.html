<!DOCTYPE html>
<html>
<head>
<title>Waleed Gaming Tasks</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

.box{
    width:320px;
    margin:40px auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}

.task{
    background:#333;
    padding:15px;
    margin:15px 0;
    border-radius:8px;
}

button{
    padding:10px;
    width:90%;
    background:#0088ff;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

</head>

<body>

<div class="box">

<h2>Waleed Gaming</h2>

<h3>Daily Tasks</h3>

<div class="task">
<h4>Task 1</h4>
<p>Copy the given text and paste it below.</p>

<input type="text" placeholder="Paste your answer here">

<br><br>

<button>Submit Task</button>

</div>

<div class="task">
<h4>Task 2</h4>
<p>New task will be added soon.</p>

<button>Complete</button>

</div>

</div>

</body>
</html>
